version: '3.8'

services:
  auth-service:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    ports:
      - "8000:8000"
    environment:
      - ENVIRONMENT=production
      - AUTH_SECRET_KEY=${AUTH_SECRET_KEY}
      - RATE_LIMIT_PER_MINUTE=60
    restart: always
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  # Other services (e.g. market-intel) could be added here
